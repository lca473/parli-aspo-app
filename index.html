<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Parli Aspo — The Language of Hope</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
/* ═══════════════════════════════════════════════════════════════
   CSS VARIABLES & RESET
═══════════════════════════════════════════════════════════════ */
:root {
  --bg: #0F1A1F;
  --bg2: #162229;
  --card: #1C2F38;
  --card-hover: #22394A;
  --green: #58CC02;
  --green-dark: #46A302;
  --green-glow: rgba(88,204,2,0.18);
  --red: #FF4B4B;
  --red-glow: rgba(255,75,75,0.12);
  --gold: #FFC800;
  --gold-glow: rgba(255,200,0,0.15);
  --blue: #1CB0F6;
  --blue-glow: rgba(28,176,246,0.12);
  --purple: #CE82FF;
  --purple-glow: rgba(206,130,255,0.12);
  --text: #FFFFFF;
  --dim: #7A99A8;
  --mid: #A3BCC9;
  --border: #263A45;
  --input: #0B151B;
  --ok: #1E4A14;
  --bad: #4A1414;
  --radius: 16px;
  --font: 'Nunito', 'Baloo 2', system-ui, sans-serif;
  --display: 'Baloo 2', 'Nunito', system-ui, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { background:#0F1A1F; scroll-behavior:smooth; }
body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; min-height:100dvh; overflow-x:hidden; }
button { font-family:var(--font); cursor:pointer; border:none; outline:none; color:#FFF; }
input, textarea, select { font-family:var(--font); outline:none; color:#FFF; }

/* ═══════════════════════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════════════════════ */
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes pop { 0%{transform:scale(0.8);opacity:0} 60%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes confetti { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(-200px) rotate(720deg);opacity:0} }
@keyframes glow { 0%,100%{box-shadow:0 0 20px var(--green-glow)} 50%{box-shadow:0 0 40px var(--green-glow)} }
@keyframes slideResult { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes starField { from{transform:translateY(0)} to{transform:translateY(-50%)} }

.fade-up { animation: fadeUp 0.4s ease-out both; }
.fade-in { animation: fadeIn 0.3s ease-out both; }
.pop { animation: pop 0.35s ease-out both; }
.shake { animation: shake 0.4s ease-out; }
.float { animation: float 3s ease-in-out infinite; }

/* ═══════════════════════════════════════════════════════════════
   VIEWS
═══════════════════════════════════════════════════════════════ */
.view { display:none; min-height:100vh; min-height:100dvh; background:var(--bg); }
.view.active { display:block; }

/* ═══════════════════════════════════════════════════════════════
   SHARED TOP NAV (all sub-pages)
═══════════════════════════════════════════════════════════════ */
.top-nav {
  position:sticky; top:0; z-index:200;
  display:flex; align-items:center; gap:12px;
  padding:14px 18px;
  background:rgba(15,26,31,0.95);
  backdrop-filter:blur(12px);
  border-bottom:1.5px solid var(--border);
}
.top-nav-back {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:12px; padding:8px 14px;
  color:var(--dim); font-size:13px; font-weight:800;
  display:flex; align-items:center; gap:6px;
  transition:all 0.15s; flex-shrink:0;
}
.top-nav-back:hover { color:var(--text); border-color:var(--mid); }
.top-nav-title {
  font-family:var(--display); font-size:18px; font-weight:800; color:var(--green);
  flex:1; text-align:center;
}
.top-nav-spacer { width:72px; flex-shrink:0; }

/* ═══════════════════════════════════════════════════════════════
   SHARED COMPONENTS
═══════════════════════════════════════════════════════════════ */
.progress-track { width:100%; height:14px; background:var(--input); border-radius:99px; overflow:hidden; }
.progress-fill { height:100%; border-radius:99px; transition:width 0.6s cubic-bezier(.34,1.56,.64,1); }
.badge { display:inline-flex; align-items:center; gap:5px; border-radius:99px; padding:4px 12px; font-size:13px; font-weight:800; }
.badge-xp { background:var(--gold-glow); border:1.5px solid var(--gold); color:var(--gold); }
.badge-streak { background:rgba(255,120,0,0.12); border:1.5px solid #FF7800; color:#FF7800; }
.badge-lessons { background:var(--blue-glow); border:1.5px solid var(--blue); color:var(--blue); }
.opt-btn { width:100%; padding:15px 18px; background:var(--card); border:2.5px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:16px; font-weight:700; text-align:left; transition:all 0.15s; position:relative; overflow:hidden; }
.opt-btn:active { transform:scale(0.97); }
.opt-btn.correct { background:var(--ok); border-color:var(--green); box-shadow:0 0 24px var(--green-glow); }
.opt-btn.wrong { background:var(--bad); border-color:var(--red); box-shadow:0 0 24px var(--red-glow); }
.opt-btn.faded { opacity:0.35; }
.match-btn { padding:12px 14px; border-radius:13px; font-size:14px; font-weight:700; border:2.5px solid var(--border); background:var(--card); color:var(--text); transition:all 0.15s; text-align:center; }
.match-btn.selected { background:var(--blue-glow); border-color:var(--blue); }
.match-btn.matched { background:var(--ok); border-color:var(--green); opacity:0.5; }
.match-btn.wrong-match { background:var(--bad); border-color:var(--red); }
.word-chip { padding:9px 15px; border-radius:11px; font-size:15px; font-weight:700; border:2.5px solid var(--border); background:var(--card); color:var(--text); transition:all 0.12s; }
.word-chip:active { transform:scale(0.93); }
.word-chip.placed { background:var(--blue-glow); border-color:var(--blue); }
.lesson-card { width:100%; display:flex; align-items:center; gap:14px; padding:14px 16px; border:2.5px solid var(--border); border-radius:var(--radius); margin-bottom:10px; text-align:left; transition:all 0.15s; background:var(--card); }
.lesson-card:active { transform:scale(0.98); }
.lesson-card.completed { background:rgba(88,204,2,0.06); border-color:var(--green); }
.lesson-card.locked { opacity:0.35; cursor:default; }
.lesson-icon { width:50px; height:50px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; background:var(--input); }
.lesson-card.completed .lesson-icon { background:var(--green-glow); border:2px solid var(--green); }
.tab-bar { display:flex; border-bottom:1.5px solid var(--border); margin:8px 20px 0; }
.tab-btn { flex:1; padding:13px 0; background:none; color:var(--dim); font-size:13px; font-weight:800; letter-spacing:0.5px; border-bottom:3px solid transparent; transition:all 0.2s; }
.tab-btn.active { color:var(--green); border-bottom-color:var(--green); }
.lb-row { display:flex; align-items:center; gap:12px; padding:12px 14px; background:var(--card); border:1.5px solid var(--border); border-radius:14px; margin-bottom:8px; }
.lb-row.is-me { background:rgba(88,204,2,0.06); border:2px solid var(--green); }
.btn-primary { width:100%; padding:16px; background:var(--green); border-radius:var(--radius); color:#fff; font-size:17px; font-weight:800; letter-spacing:0.3px; box-shadow:0 4px 20px var(--green-glow), inset 0 1px 0 rgba(255,255,255,0.15); transition:all 0.15s; border:none; }
.btn-primary:active { transform:scale(0.97); background:var(--green-dark); }
.btn-primary:disabled { background:var(--border); box-shadow:none; cursor:default; }
.btn-secondary { width:100%; padding:14px; background:none; border:2px solid var(--border); border-radius:var(--radius); color:var(--dim); font-size:15px; font-weight:700; }
.check-bar { position:fixed; bottom:0; left:0; right:0; padding:16px 20px; padding-bottom:max(16px, env(safe-area-inset-bottom)); background:linear-gradient(transparent, var(--bg) 30%); }
.confetti-piece { position:fixed; width:10px; height:10px; border-radius:2px; animation:confetti 1.2s ease-out forwards; pointer-events:none; }
.pronun { color:var(--blue); font-size:13px; font-style:italic; font-weight:600; margin-top:2px; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }

/* ═══════════════════════════════════════════════════════════════
   LANDING PAGE
═══════════════════════════════════════════════════════════════ */
#view-home {
  position:relative;
  overflow:hidden;
}
.landing-stars {
  position:absolute; top:0; left:0; right:0; bottom:0;
  pointer-events:none; z-index:0; overflow:hidden;
}
.star {
  position:absolute; background:#FFF; border-radius:50%;
  animation:float linear infinite;
  opacity:0.15;
}
.landing-content {
  position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center;
  min-height:100vh; min-height:100dvh;
  padding:0 20px 20px;
}
.landing-hero {
  display:flex; flex-direction:column; align-items:center;
  padding:28px 0 20px;
  text-align:center;
}
.landing-globe {
  font-size:56px;
  animation:float 3.5s ease-in-out infinite;
  filter:drop-shadow(0 0 40px rgba(88,204,2,0.4));
  margin-bottom:14px;
}
.landing-title {
  font-family:var(--display);
  font-size:clamp(32px, 10vw, 52px);
  font-weight:800;
  color:var(--green);
  letter-spacing:-1px;
  line-height:1.1;
  margin-bottom:6px;
  text-shadow:0 0 60px rgba(88,204,2,0.3);
}
.landing-subtitle {
  font-size:16px; font-weight:600; color:var(--dim);
  margin-bottom:4px;
}
.landing-tagline {
  font-size:13px; color:var(--mid); font-weight:600;
  background:var(--card); border:1.5px solid var(--border);
  border-radius:99px; padding:6px 16px; margin-top:14px;
  display:inline-block;
}
.landing-stats {
  display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
  margin:16px 0 20px;
}
.landing-stat {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:14px; padding:10px 16px; text-align:center;
  min-width:80px;
}
.landing-stat-num { font-family:var(--display); font-size:24px; font-weight:800; color:var(--green); }
.landing-stat-label { font-size:12px; font-weight:700; color:var(--dim); margin-top:2px; }
.landing-cards {
  display:flex; flex-direction:column; gap:10px;
  width:100%; max-width:480px;
}
.landing-card {
  display:flex; align-items:center; gap:14px;
  padding:14px 18px;
  background:var(--card); border:2px solid var(--border);
  border-radius:var(--radius);
  text-align:left; width:100%;
  transition:all 0.2s;
  position:relative; overflow:hidden;
}
.landing-card::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(88,204,2,0.04), transparent);
  opacity:0; transition:opacity 0.2s;
}
.landing-card:hover { border-color:var(--green); transform:translateY(-2px); box-shadow:0 8px 32px rgba(88,204,2,0.12); }
.landing-card:hover::before { opacity:1; }
.landing-card:active { transform:scale(0.98); }
.landing-card-icon {
  width:46px; height:46px; border-radius:14px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:24px;
}
.landing-card-body { flex:1; min-width:0; }
.landing-card-title { font-family:var(--display); font-size:18px; font-weight:800; color:var(--text); margin-bottom:4px; }
.landing-card-desc { font-size:13px; font-weight:600; color:var(--dim); }
.landing-card-arrow { color:var(--green); font-size:22px; flex-shrink:0; }
.landing-contact-link {
  margin-top:36px;
  color:var(--dim); font-size:13px; font-weight:700;
  display:flex; align-items:center; gap:6px;
  text-decoration:none; background:none; border:none; cursor:pointer;
  transition:color 0.15s;
}
.landing-contact-link:hover { color:var(--mid); }

/* ═══════════════════════════════════════════════════════════════
   GRAMMAR PAGE
═══════════════════════════════════════════════════════════════ */
.grammar-content {
  max-width:680px; margin:0 auto;
  padding:20px 18px 80px;
}
.grammar-intro {
  background:linear-gradient(135deg, rgba(88,204,2,0.06), rgba(28,176,246,0.04));
  border:1.5px solid var(--border); border-radius:var(--radius);
  padding:18px 20px; margin-bottom:20px;
  font-size:14px; font-weight:600; color:var(--mid); line-height:1.7;
}
.grammar-intro strong { color:var(--text); }
.grammar-section {
  margin-bottom:12px;
  border:1.5px solid var(--border); border-radius:var(--radius);
  overflow:hidden; background:var(--card);
}
.grammar-section-header {
  display:flex; align-items:center; gap:12px;
  padding:16px 18px; cursor:pointer;
  transition:background 0.15s;
  user-select:none;
}
.grammar-section-header:hover { background:var(--card-hover); }
.grammar-section-icon { font-size:20px; flex-shrink:0; }
.grammar-section-title { font-family:var(--display); font-size:16px; font-weight:800; color:var(--text); flex:1; }
.grammar-section-chevron {
  color:var(--dim); font-size:16px; flex-shrink:0;
  transition:transform 0.25s;
}
.grammar-section.open .grammar-section-chevron { transform:rotate(180deg); }
.grammar-section-body {
  display:none; padding:0 18px 18px;
  animation:fadeIn 0.2s ease-out both;
}
.grammar-section.open .grammar-section-body { display:block; }
.grammar-section-body p {
  font-size:14px; color:var(--mid); font-weight:600; line-height:1.7;
  margin-bottom:12px;
}
.grammar-section-body p strong { color:var(--text); }
.grammar-section-body em { color:var(--blue); font-style:italic; }
.grammar-section-body ul {
  list-style:none; margin-bottom:12px;
}
.grammar-section-body ul li {
  font-size:14px; color:var(--mid); font-weight:600; line-height:1.6;
  padding:4px 0 4px 18px; position:relative;
}
.grammar-section-body ul li::before {
  content:'•'; position:absolute; left:0; color:var(--green);
}
.grammar-section-body ul li strong { color:var(--text); }
.grammar-section-body ul li em { color:var(--blue); font-style:italic; }
.grammar-table-wrap { overflow-x:auto; margin:12px 0; border-radius:12px; border:1.5px solid var(--border); }
.grammar-table { width:100%; border-collapse:collapse; font-size:13px; }
.grammar-table th {
  padding:10px 14px; background:var(--bg2);
  color:var(--green); font-weight:800; text-align:left;
  font-size:12px; letter-spacing:0.3px; text-transform:uppercase;
  border-bottom:1px solid var(--border);
}
.grammar-table td {
  padding:10px 14px; color:var(--mid); font-weight:600;
  border-bottom:1px solid var(--border); line-height:1.5;
}
.grammar-table tr:last-child td { border-bottom:none; }
.grammar-table td:first-child { color:var(--text); font-weight:700; }
.grammar-table td em { color:var(--blue); font-style:italic; }
.grammar-callout {
  background:rgba(28,176,246,0.06); border:1.5px solid rgba(28,176,246,0.2);
  border-radius:12px; padding:12px 16px; margin:12px 0;
  font-size:13px; color:var(--mid); font-weight:600; line-height:1.6;
}
.grammar-callout strong { color:var(--blue); }
.grammar-section-divider {
  height:1px; background:var(--border); margin:12px 0;
}
.grammar-sub-header {
  font-size:13px; font-weight:800; color:var(--green);
  letter-spacing:0.3px; text-transform:uppercase;
  margin:14px 0 8px;
}

/* ═══════════════════════════════════════════════════════════════
   DICTIONARY PAGE
═══════════════════════════════════════════════════════════════ */
.dict-content {
  max-width:640px; margin:0 auto;
  padding:16px 16px 80px;
}
.dict-stats {
  display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;
}
.dict-stat-chip {
  padding:5px 12px; border-radius:99px;
  font-size:12px; font-weight:800;
  background:var(--card); border:1.5px solid var(--border); color:var(--dim);
}
.dict-stat-chip.blue { background:var(--blue-glow); border-color:rgba(28,176,246,0.25); color:var(--blue); }
.dict-stat-chip.green { background:var(--green-glow); border-color:rgba(88,204,2,0.25); color:var(--green); }
.dict-panel {
  background:var(--card); border:2px solid var(--border);
  border-radius:var(--radius); padding:18px; margin-bottom:14px;
}
.dict-panel.pa-panel { border-color:rgba(88,204,2,0.2); }
.dict-panel-label {
  display:flex; align-items:center; gap:8px; margin-bottom:12px;
}
.dict-flag {
  width:32px; height:22px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:900; color:#FFF;
}
.dict-flag.flag-en { background:linear-gradient(135deg,#1CB0F6,#0d8ec7); }
.dict-flag.flag-pa { background:linear-gradient(135deg,#58CC02,#46A302); }
.dict-panel-lang { font-size:14px; font-weight:800; color:var(--mid); }
.dict-input-wrap { position:relative; }
.dict-search-input {
  width:100%; padding:13px 40px 13px 16px;
  background:var(--input); border:2px solid var(--border);
  border-radius:12px; color:var(--text); font-size:16px; font-weight:700;
  transition:border-color 0.15s;
}
.dict-search-input:focus { border-color:var(--blue); }
.dict-clear-btn {
  position:absolute; right:10px; top:50%; transform:translateY(-50%);
  background:none; border:none; color:var(--dim); font-size:16px;
  cursor:pointer; padding:4px; opacity:0; transition:opacity 0.15s;
}
.dict-clear-btn.visible { opacity:1; }
.dict-results { margin-top:10px; }
.dict-result-item {
  display:flex; align-items:flex-start; gap:10px;
  padding:10px 12px; border-radius:12px;
  background:var(--bg2); margin-bottom:6px;
  animation:slideResult 0.2s ease-out both;
}
.dict-result-arrow { color:var(--green); font-weight:800; font-size:14px; margin-top:1px; flex-shrink:0; }
.dict-result-word { font-size:16px; font-weight:800; color:var(--text); }
.dict-result-translation { font-size:13px; font-weight:600; color:var(--mid); margin-top:2px; }
.dict-result-pos {
  font-size:11px; font-weight:800; color:var(--dim);
  background:var(--input); border-radius:6px; padding:2px 7px;
  display:inline-block; margin-top:4px;
}
.dict-result-note { font-size:11px; color:var(--blue); font-weight:700; margin-top:3px; }
.dict-result-count { font-size:12px; font-weight:700; color:var(--dim); margin-bottom:6px; padding-left:2px; }
.dict-no-results { text-align:center; padding:24px; color:var(--dim); }
.dict-no-results-icon { font-size:32px; margin-bottom:8px; }
.dict-divider {
  display:flex; align-items:center; gap:10px; margin:14px 0;
}
.dict-divider-line { flex:1; height:1px; background:var(--border); }
.dict-divider-icon { color:var(--dim); font-size:18px; font-weight:800; }
.dict-grammar-tip {
  background:linear-gradient(135deg, rgba(88,204,2,0.06), rgba(28,176,246,0.06));
  border:1.5px solid var(--border); border-radius:var(--radius);
  padding:16px 18px; margin-top:20px;
}
.dict-grammar-tip-title { font-size:14px; font-weight:800; color:var(--green); margin-bottom:8px; }
.dict-grammar-tip-text { font-size:13px; font-weight:600; color:var(--mid); line-height:1.6; }
.dict-grammar-tip-text strong { color:var(--text); }
.dict-browse-section { margin-top:24px; }
.dict-browse-title { font-size:16px; font-weight:800; color:var(--mid); margin-bottom:12px; }
.dict-letter-nav { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
.dict-letter-btn {
  width:36px; height:36px; border-radius:10px;
  background:var(--card); border:1.5px solid var(--border);
  color:var(--mid); font-size:14px; font-weight:800;
  cursor:pointer; transition:all 0.15s;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font);
}
.dict-letter-btn:hover { background:var(--card-hover); color:var(--text); }
.dict-letter-btn.active { background:var(--green-glow); border-color:var(--green); color:var(--green); }
.dict-letter-btn.disabled { opacity:0.25; cursor:default; }

// EXERCISE GENERATOR

function generateExercises(lessonId){
  const lesson=LESSONS.find(l=>l.id===lessonId);
  if(!lesson)return[];

  // Final test: draw from full vocab pool
  if(lesson.isFinalTest){
    return generateFinalTest();
  }

  // Free text lessons
  if(lesson.isFreeText){
    return generateFreeTextExercises(lesson);
  }

  // Paragraph lessons
  if(lesson.isParagraph){
    return generateParagraphExercises(lesson);
  }

  // Sentence checkpoint lessons
  if(lesson.isSentence){
    return generateSentenceExercises(lesson);
  }

  // Review lessons with review pool
  if(lesson.isReview && lesson.reviewPool){
    return generateReviewExercises(lesson);
  }

  // Standard vocabulary lessons
  return generateVocabExercises(lesson);
}

function generateVocabExercises(lesson){
  const items=V[lesson.vocabKey];
  if(!items||items.length===0)return[];
  const wordItems=items.map(v=>({pa:Array.isArray(v.pa)?v.pa.join(" "):v.pa,en:v.en,note:v.note||null}));
  const exercises=[];
  const wordUsage={};
  const canAdd=(w)=>(wordUsage[w]||0)<2;
  const markUsed=(w)=>{wordUsage[w]=(wordUsage[w]||0)+1;};

  // 1. MC: PA → EN (for each word)
  shuffle(wordItems).forEach(item=>{
    if(!canAdd(item.pa))return;
    const wrong=pick(wordItems.filter(v=>v.en!==item.en),3).map(v=>v.en);
    if(wrong.length<3)return;
    exercises.push({type:"mc",prompt:`What does "${item.pa}" mean?`,correct:item.en,options:shuffle([item.en,...wrong]),note:item.note,paWord:item.pa});
    markUsed(item.pa);
  });

  // 2. MC: EN → PA (for subset)
  shuffle(wordItems).slice(0,5).forEach(item=>{
    if(!canAdd(item.pa))return;
    const wrong=pick(wordItems.filter(v=>v.pa!==item.pa),3).map(v=>v.pa);
    if(wrong.length<3)return;
    exercises.push({type:"mc",prompt:`How do you say "${item.en}" in Parli Aspo?`,correct:item.pa,options:shuffle([item.pa,...wrong])});
    markUsed(item.pa);
  });

  // 3. True/False
  shuffle(wordItems).slice(0,4).forEach(item=>{
    if(!canAdd(item.pa))return;
    const isTrue=Math.random()>0.5;
    let shownEn=item.en;
    if(!isTrue){const wrong=pick(wordItems.filter(v=>v.en!==item.en),1);if(wrong.length)shownEn=wrong[0].en;}
    exercises.push({type:"tf",prompt:`"${item.pa}" means "${shownEn}"`,correct:isTrue,correctLabel:item.en,paWord:item.pa});
    markUsed(item.pa);
  });

  // 4. Match pairs
  const matchItems=pick(wordItems,4);
  exercises.push({type:"match",pairs:matchItems.map(v=>({left:v.pa,right:v.en}))});

  // 5. Fill in the blank (PA word given English)
  shuffle(wordItems).slice(0,3).forEach(item=>{
    if(!canAdd(item.pa))return;
    exercises.push({type:"fill",prompt:`"${item.en}" in Parli Aspo is:`,correct:item.pa.toLowerCase()});
    markUsed(item.pa);
  });

  // 6. Reverse fill: PA sentence with blank
  const sentData=LS[lesson.vocabKey];
  if(sentData&&sentData.length>0){
    pick(sentData,2).forEach(s=>{
      const pArr=s.pa;
      if(pArr.length<3)return;
      const blankIdx=Math.floor(Math.random()*(pArr.length-1))+1;
      const blankedWord=pArr[blankIdx];
      const displaySent=pArr.map((w,i)=>i===blankIdx?"___":w).join(" ");
      const wrong=pick(wordItems.filter(v=>v.pa.toLowerCase()!==blankedWord.toLowerCase()),3).map(v=>v.pa);
      if(wrong.length<3)return;
      exercises.push({type:"revfill",prompt:`Fill in the blank:\n"${displaySent}"`,correct:blankedWord,options:shuffle([blankedWord,...wrong]),sentenceEn:s.en});
    });
  }

  // 7. Error correction (wrong word in sentence)
  if(sentData&&sentData.length>0){
    pick(sentData,2).forEach(s=>{
      const pArr=[...s.pa];
      if(pArr.length<3)return;
      const errIdx=Math.floor(Math.random()*(pArr.length-1))+1;
      const correctWord=pArr[errIdx];
      const wrongWord=pick(wordItems.filter(v=>v.pa.toLowerCase()!==correctWord.toLowerCase()),1);
      if(!wrongWord.length)return;
      const errSent=[...pArr];errSent[errIdx]=wrongWord[0].pa;
      exercises.push({type:"errcorrect",prompt:`Is this sentence correct?\n"${errSent.join(" ")}"`,sentenceEn:s.en,isCorrect:false,correctSent:pArr.join(" "),errorWord:wrongWord[0].pa,correctWord});
    });
  }

  // 8. Mini word-order sentences
  if(sentData&&sentData.length>0){
    pick(sentData,3).forEach(s=>{
      exercises.push({type:"wordOrder",prompt:`Translate: "${s.en}"`,correctOrder:s.pa,shuffled:shuffle([...s.pa])});
    });
  }

  const shuffled=shuffle(exercises);
  // Ensure at least 12 exercises, cap at 15
  return shuffled.slice(0,Math.min(Math.max(shuffled.length,1),15));
}

function generateSentenceExercises(lesson){
  const items=V[lesson.vocabKey];
  if(!items||items.length===0)return[];
  const exercises=[];

  // Word order for each sentence
  items.forEach(item=>{
    exercises.push({type:"wordOrder",prompt:`Translate: "${item.en}"`,correctOrder:item.pa,shuffled:shuffle([...item.pa])});
  });

  // MC: what does this sentence mean?
  shuffle(items).slice(0,5).forEach(item=>{
    const wrong=pick(items.filter(v=>v.en!==item.en),3).map(v=>v.en);
    if(wrong.length>=3)exercises.push({type:"mc",prompt:`What does "${item.pa.join(" ")}" mean?`,correct:item.en,options:shuffle([item.en,...wrong])});
  });

  // True/False on sentences
  shuffle(items).slice(0,4).forEach(item=>{
    const isTrue=Math.random()>0.5;
    let shownEn=item.en;
    if(!isTrue){const wrong=pick(items.filter(v=>v.en!==item.en),1);if(wrong.length)shownEn=wrong[0].en;}
    exercises.push({type:"tf",prompt:`"${item.pa.join(" ")}" means:\n"${shownEn}"`,correct:isTrue,correctLabel:item.en});
  });

  // Error correction on sentences
  shuffle(items).slice(0,3).forEach(item=>{
    const isCorrect=Math.random()>0.5;
    if(isCorrect){
      exercises.push({type:"errcorrect",prompt:`Is this sentence correct?\n"${item.pa.join(" ")}"`,sentenceEn:item.en,isCorrect:true,correctSent:item.pa.join(" ")});
    } else {
      const errPA=[...item.pa];
      const errIdx=Math.floor(Math.random()*(errPA.length-1))+1;
      const errWords=["la","de","en","kon","i","ma","ke","esi","na","da"];
      const sub=pick(errWords.filter(w=>w!==errPA[errIdx].toLowerCase()),1)[0]||"lo";
      errPA[errIdx]=sub;
      exercises.push({type:"errcorrect",prompt:`Is this sentence correct?\n"${errPA.join(" ")}"`,sentenceEn:item.en,isCorrect:false,correctSent:item.pa.join(" ")});
    }
  });

  return shuffle(exercises).slice(0,Math.min(15,exercises.length));
}

function generateReviewExercises(lesson){
  const pool=lesson.reviewPool||[];
  const allItems=[];
  pool.forEach(key=>{
    const arr=V[key];
    if(arr&&!arr[0]?.sentences){
      arr.forEach(v=>{
        if(!Array.isArray(v.pa)){allItems.push({pa:v.pa,en:v.en,note:v.note||null});}
      });
    }
  });
  if(allItems.length===0)return[];

  const exercises=[];
  const wordUsage={};
  const canAdd=(w)=>(wordUsage[w]||0)<2;
  const markUsed=(w)=>{wordUsage[w]=(wordUsage[w]||0)+1;};
  const picked=pick(allItems,Math.min(allItems.length,20));

  picked.forEach(item=>{
    if(!canAdd(item.pa))return;
    const wrong=pick(allItems.filter(v=>v.en!==item.en),3).map(v=>v.en);
    if(wrong.length<3)return;
    exercises.push({type:"mc",prompt:`What does "${item.pa}" mean?`,correct:item.en,options:shuffle([item.en,...wrong]),note:item.note});
    markUsed(item.pa);
  });

  shuffle(picked).slice(0,6).forEach(item=>{
    if(!canAdd(item.pa))return;
    const wrong=pick(allItems.filter(v=>v.pa!==item.pa),3).map(v=>v.pa);
    if(wrong.length<3)return;
    exercises.push({type:"mc",prompt:`How do you say "${item.en}" in Parli Aspo?`,correct:item.pa,options:shuffle([item.pa,...wrong])});
    markUsed(item.pa);
  });

  shuffle(picked).slice(0,4).forEach(item=>{
    if(!canAdd(item.pa))return;
    const isTrue=Math.random()>0.5;
    let shownEn=item.en;
    if(!isTrue){const wrong=pick(allItems.filter(v=>v.en!==item.en),1);if(wrong.length)shownEn=wrong[0].en;}
    exercises.push({type:"tf",prompt:`"${item.pa}" means "${shownEn}"`,correct:isTrue,correctLabel:item.en,paWord:item.pa});
    markUsed(item.pa);
  });

  const matchItems=pick(picked,4);
  exercises.push({type:"match",pairs:matchItems.map(v=>({left:v.pa,right:v.en}))});

  shuffle(picked).slice(0,3).forEach(item=>{
    if(!canAdd(item.pa))return;
    exercises.push({type:"fill",prompt:`"${item.en}" in Parli Aspo is:`,correct:item.pa.toLowerCase()});
    markUsed(item.pa);
  });

  return shuffle(exercises).slice(0,15);
}

function generateParagraphExercises(lesson){
  const paraGroups=V[lesson.vocabKey];
  if(!paraGroups||paraGroups.length===0)return[];
  const exercises=[];

  paraGroups.forEach(para=>{
    // Intro MC: what is this paragraph about?
    const enWords=para.en.split(" ").slice(0,6).join(" ")+"…";
    exercises.push({type:"paraIntro",prompt:`📖 Read this paragraph:\n"${para.en}"`,info:true,label:"Paragraph Preview"});

    // Word order for each sentence in paragraph
    para.sentences.forEach(s=>{
      exercises.push({type:"wordOrder",prompt:`Translate: "${s.en}"`,correctOrder:s.pa,shuffled:shuffle([...s.pa])});
    });

    // TF on a sentence from the paragraph
    const tfSent=para.sentences[0];
    const isTrue=Math.random()>0.5;
    let shownEn=tfSent.en;
    if(!isTrue&&para.sentences.length>1){shownEn=para.sentences[para.sentences.length-1].en;}
    exercises.push({type:"tf",prompt:`"${tfSent.pa.join(" ")}" means:\n"${shownEn}"`,correct:isTrue,correctLabel:tfSent.en});

    // Error correction on a sentence
    const errSent=para.sentences[Math.min(1,para.sentences.length-1)];
    const errPA=[...errSent.pa];
    const errIdx=Math.max(1,Math.floor(Math.random()*(errPA.length-1)));
    const sub=["la","de","en","kon","i","ma"].filter(w=>w!==errPA[errIdx].toLowerCase())[0]||"lo";
    errPA[errIdx]=sub;
    exercises.push({type:"errcorrect",prompt:`Is this sentence correct?\n"${errPA.join(" ")}"`,sentenceEn:errSent.en,isCorrect:false,correctSent:errSent.pa.join(" ")});
  });

  return shuffle(exercises.filter(e=>e.type!=="paraIntro")).slice(0,14).concat(
    exercises.filter(e=>e.type==="paraIntro").slice(0,1)
  ).slice(0,15);
}

function generateFreeTextExercises(lesson){
  const prompts=shuffle([...FREETEXT_PROMPTS]).slice(0,4);
  const exercises=[];
  prompts.forEach(p=>{
    exercises.push({type:"freetext",prompt:p.prompt,hint:p.hint});
  });
  // Also add some MC review from broad pool
  const reviewKeys=["coreVerbs1","basicVerbs2","movement","preps1","conjunctions1","feelings1","abstract1","tense1","mal1","compound1"];
  const allItems=[];
  reviewKeys.forEach(key=>{const arr=V[key];if(arr)arr.forEach(v=>{if(!Array.isArray(v.pa))allItems.push({pa:v.pa,en:v.en});});});
  pick(allItems,8).forEach(item=>{
    const wrong=pick(allItems.filter(v=>v.en!==item.en),3).map(v=>v.en);
    if(wrong.length>=3)exercises.push({type:"mc",prompt:`What does "${item.pa}" mean?`,correct:item.en,options:shuffle([item.en,...wrong])});
  });
  return shuffle(exercises).slice(0,12);
}

function generateFinalTest(){
  const allKeys=["greetings1","pronouns1","possessives","articles1","coreVerbs1","numbers","people1","people2","basicAdj","colors1","basicVerbs2","movement","preps1","conjunctions1","time1","days","food1","food2","kitchen","home1","home2","objects1","objects2","body1","body2","health","daily1","daily2","nature1","nature2","nature3","animals1","animals2","places","transport","time2","feelings1","feelings2","personality","abstract1","abstract2","adverbs","quantities","communication","tense1","tense2","mal1","mal2","compound1","compound2","reprefix","diminutive","advanced1","advanced2","advanced3","advanced4"];
  const allItems=[];
  allKeys.forEach(key=>{const arr=V[key];if(arr)arr.forEach(v=>{if(!Array.isArray(v.pa))allItems.push({pa:v.pa,en:v.en,note:v.note||null});});});
  const exercises=[];
  const used=new Set();

  // 5 PA→EN MC from diverse pool
  pick(allItems.filter(v=>!used.has(v.pa)),5).forEach(item=>{
    used.add(item.pa);
    const wrong=pick(allItems.filter(v=>v.en!==item.en),3).map(v=>v.en);
    if(wrong.length>=3)exercises.push({type:"mc",prompt:`What does "${item.pa}" mean?`,correct:item.en,options:shuffle([item.en,...wrong])});
  });

  // 4 EN→PA MC
  pick(allItems.filter(v=>!used.has(v.pa)),4).forEach(item=>{
    used.add(item.pa);
    const wrong=pick(allItems.filter(v=>v.pa!==item.pa),3).map(v=>v.pa);
    if(wrong.length>=3)exercises.push({type:"mc",prompt:`How do you say "${item.en}" in Parli Aspo?`,correct:item.pa,options:shuffle([item.pa,...wrong])});
  });

  // 3 True/False
  pick(allItems.filter(v=>!used.has(v.pa)),3).forEach(item=>{
    used.add(item.pa);
    const isTrue=Math.random()>0.5;
    let shownEn=item.en;
    if(!isTrue){const w=pick(allItems.filter(v=>v.en!==item.en),1);if(w.length)shownEn=w[0].en;}
    exercises.push({type:"tf",prompt:`"${item.pa}" means "${shownEn}"`,correct:isTrue,correctLabel:item.en});
  });

  // 1 match
  const matchItems=pick(allItems.filter(v=>!used.has(v.pa)),4);
  matchItems.forEach(v=>used.add(v.pa));
  exercises.push({type:"match",pairs:matchItems.map(v=>({left:v.pa,right:v.en}))});

  // 2 fill
  pick(allItems.filter(v=>!used.has(v.pa)),2).forEach(item=>{
    used.add(item.pa);
    exercises.push({type:"fill",prompt:`"${item.en}" in Parli Aspo is:`,correct:item.pa.toLowerCase()});
  });

  // 3 word-order from sentence checkpoints
  const sentKeys=["s1","s2","s3","s4","s5"];
  const allSents=[];
  sentKeys.forEach(k=>{const arr=V[k];if(arr)arr.forEach(s=>allSents.push(s));});
  pick(allSents,3).forEach(s=>{
    exercises.push({type:"wordOrder",prompt:`Translate: "${s.en}"`,correctOrder:s.pa,shuffled:shuffle([...s.pa])});
  });

  // 2 reverse fill from sentence checkpoints
  pick(allSents,2).forEach(s=>{
    const pArr=s.pa;if(pArr.length<3)return;
    const blankIdx=Math.floor(Math.random()*(pArr.length-1))+1;
    const blankedWord=pArr[blankIdx];
    const displaySent=pArr.map((w,i)=>i===blankIdx?"___":w).join(" ");
    const wrong=pick(allItems,3).map(v=>v.pa).filter(w=>w.toLowerCase()!==blankedWord.toLowerCase()).slice(0,3);
    if(wrong.length>=3)exercises.push({type:"revfill",prompt:`Fill in the blank:\n"${displaySent}"`,correct:blankedWord,options:shuffle([blankedWord,...wrong]),sentenceEn:s.en});
  });

  // 2 paragraph word-order from para data
  const paraSentPool=[];
  ["para6","para7","para8"].forEach(k=>{const arr=V[k];if(arr)arr.forEach(pg=>{if(pg.sentences)pg.sentences.forEach(s=>paraSentPool.push(s));});});
  pick(paraSentPool,2).forEach(s=>{
    exercises.push({type:"wordOrder",prompt:`Translate: "${s.en}"`,correctOrder:s.pa,shuffled:shuffle([...s.pa])});
  });

  return shuffle(exercises).slice(0,20);
}

// UTILITY & USER DATA FUNCTIONS

function shuffle(arr) {
  const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;
}
function pick(arr,n){return shuffle(arr).slice(0,n);}
function saveLocal(key,val){try{localStorage.setItem(key,JSON.stringify(val))}catch(e){}}
function loadLocal(key,def){try{const v=localStorage.getItem(key);return v?JSON.parse(v):def}catch(e){return def}}
function getCurrentUsername(){return loadLocal("pa_current_user","");}
function setCurrentUsername(name){saveLocal("pa_current_user",name);}
function applyStreakLogic(data){
  // Load-time check only: reset streak if user missed a day. Streak increments
  // happen exclusively on lesson completion (see handleAnswer), not on app load.
  if(data.lastActiveDate){
    const today=new Date().toDateString();
    const yesterday=new Date(Date.now()-86400000).toDateString();
    if(data.lastActiveDate!==today&&data.lastActiveDate!==yesterday)data.streak=0;
  }
  return data;
}
function loadUserData(username){
  if(!username)return{username:"",xp:0,streak:0,lessonsCompleted:[],lastActiveDate:null};
  const data=loadLocal("pa_user_"+username,{username,xp:0,streak:0,lessonsCompleted:[],lastActiveDate:null});
  data.username=username;
  return applyStreakLogic(data);
}
async function loadUserDataCloud(username){
  if(!username)return{username:"",xp:0,streak:0,lessonsCompleted:[],lastActiveDate:null};
  if(firebaseReady&&db){
    try{
      const key=username.replace(/[.#$\/\[\]]/g,"_");
      const snap=await db.ref("users/"+key).once("value");
      if(snap.exists()){
        const data=snap.val();
        data.username=username;
        data.lessonsCompleted=data.lessonsCompleted||[];
        const updated=applyStreakLogic(data);
        saveLocal("pa_user_"+username,updated);
        return updated;
      }
    }catch(e){console.warn("Firebase load error:",e);}
  }
  return loadUserData(username);
}
function saveUserData(data){
  if(!data.username)return;
  saveLocal("pa_user_"+data.username,data);
  if(firebaseReady&&db){
    const key=data.username.replace(/[.#$\/\[\]]/g,"_");
    db.ref("users/"+key).set({...data,updatedAt:Date.now()}).catch(e=>console.warn("Firebase save error:",e));
  }
}
async function pushToLeaderboard(data){
  if(!firebaseReady||!db||!data.username)return;
  if(data.username.toLowerCase()==="admin")return;
  try{await db.ref("leaderboard/"+data.username.replace(/[.#$\/\[\]]/g,"_")).set({name:data.username,xp:data.xp,streak:data.streak,lessons:data.lessonsCompleted.length,updatedAt:Date.now()});}
  catch(e){console.warn("Firebase push error:",e);}
}
async function fetchLeaderboard(){
  if(!firebaseReady||!db)return[];
  try{const snap=await db.ref("leaderboard").orderByChild("xp").limitToLast(50).once("value");const entries=[];snap.forEach(c=>{entries.push(c.val());});return entries.sort((a,b)=>b.xp-a.xp);}
  catch(e){console.warn("Firebase fetch error:",e);return[];}
}

    setState({unitToggleOverrides:newOverrides});

  // Scroll to just-finished lesson if returning from completion
  if(state.scrollToLessonId){
    const targetId=state.scrollToLessonId;
    state.scrollToLessonId=null; // clear marker so it only fires once
    const idx=LESSONS.findIndex(l=>l.id===targetId);
    if(idx>=0){
      // Make sure the parent unit is expanded so the card is visible
      const parentUnitIdx=UNITS.findIndex((u,ui)=>{
        const uStart=u.start;
        const uEnd=(ui+1<UNITS.length)?UNITS[ui+1].start:LESSONS.length;
        return idx>=uStart && idx<uEnd;
      });
      if(parentUnitIdx>=0){
        const body=document.querySelector(`[data-unit-body="${parentUnitIdx}"]`);
        if(body && body.style.display==='none'){
          body.style.display='';

          if(header)header.textContent='▾';

        }
      }
      requestAnimationFrame(()=>{
        const card=document.querySelector(`.lesson-card[data-idx="${idx}"]`);
        if(card)card.scrollIntoView({behavior:"smooth",block:"center"});
      });
    }
  }
}

function startLesson(idx){
  const lesson=LESSONS[idx];
  const exercises=generateExercises(lesson.id);
  if(!exercises||exercises.length===0){alert("No exercises available for this lesson.");return;}
  const ex=exercises[0];
  const isFinal=lesson.isFinalTest;
  // Cancel any in-flight smooth scroll (e.g. from returning home after a lesson) by forcing instant scroll
  window.scrollTo({top:0,left:0,behavior:"instant"});
  setState({
    screen:"lesson",lesson,exercises,exIdx:0,correct:0,
    hearts:isFinal?999:3, // Final test: no hearts (999 = unlimited, handled in renderLesson)
    isFinalTest:isFinal,
    accXP:0,
    mcSelected:null,mcAnswered:false,
    matchSelectedLeft:null,matchMatched:[],matchWrong:null,
    matchShuffledRight:ex.type==="match"?shuffle(ex.pairs.map(p=>p.right)):[],
    fillInput:"",fillAnswered:false,fillCorrect:false,
    woSelected:[],woAvailable:ex.type==="wordOrder"?[...ex.shuffled]:[],woAnswered:false,woCorrect:false,
    tfAnswered:false,tfSelected:null,
    revfillSelected:null,revfillAnswered:false,
    errcorrectSelected:null,errcorrectAnswered:false,
    freetextInput:"",freetextSubmitted:false,
    waitingContinue:false,
  });
  // Re-apply instant scroll after DOM is replaced and any pending animation frame fires,
  // to defeat in-flight smooth scrolls that survive innerHTML replacement
  requestAnimationFrame(()=>window.scrollTo({top:0,left:0,behavior:"instant"}));
}

function renderLesson(){
  const ex=state.exercises[state.exIdx];
  const pct=state.exIdx/state.exercises.length*100;
  const isFinal=state.isFinalTest;

  let heartsHTML="";
  if(isFinal){
    heartsHTML=`<span style="color:var(--gold);font-size:13px;font-weight:800">🎓 FINAL TEST</span>`;
  } else {
    heartsHTML=[...Array(3)].map((_,i)=>`<span style="font-size:20px;opacity:${i<state.hearts?1:0.2}">❤️</span>`).join("");
  }

  let exHTML="";
  if(ex.type==="mc")exHTML=renderMC(ex);
  else if(ex.type==="match")exHTML=renderMatch(ex);
  else if(ex.type==="fill")exHTML=renderFill(ex);
  else if(ex.type==="wordOrder")exHTML=renderWordOrder(ex);
  else if(ex.type==="tf")exHTML=renderTF(ex);
  else if(ex.type==="revfill")exHTML=renderRevFill(ex);
  else if(ex.type==="errcorrect")exHTML=renderErrCorrect(ex);
  else if(ex.type==="freetext")exHTML=renderFreeText(ex);
  else if(ex.type==="paraIntro")exHTML=renderParaIntro(ex);

  let continueHTML="";
  if(state.waitingContinue){
    continueHTML=`<div class="check-bar"><button id="continueBtn" class="btn-primary" style="background:var(--red);box-shadow:0 4px 20px var(--red-glow)">CONTINUE</button></div>`;
  }

  app.innerHTML=`<div style="padding:0 16px 100px 16px">
    <div class="lesson-header">
      <button id="closeBtn" style="background:none;color:var(--dim);font-size:24px;padding:4px">✕</button>
      <div style="flex:1" class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${isFinal?'var(--gold)':'var(--green)'}"></div></div>
      <div style="display:flex;gap:2px">${heartsHTML}</div>
    </div>
    <div style="max-width:480px;margin:0 auto" class="fade-up">${exHTML}</div>
  </div>${continueHTML}`;

  document.getElementById("closeBtn").addEventListener("click",()=>setState({screen:"home",scrollToLessonId:state.lesson.id}));
  const contBtn=document.getElementById("continueBtn");if(contBtn)contBtn.addEventListener("click",()=>advanceAfterAnswer());

  if(ex.type==="mc")bindMC(ex);
  else if(ex.type==="match")bindMatch(ex);
  else if(ex.type==="fill")bindFill(ex);
  else if(ex.type==="wordOrder")bindWordOrder(ex);
  else if(ex.type==="tf")bindTF(ex);
  else if(ex.type==="revfill")bindRevFill(ex);
  else if(ex.type==="errcorrect")bindErrCorrect(ex);
  else if(ex.type==="freetext")bindFreeText(ex);
  else if(ex.type==="paraIntro")bindParaIntro(ex);
}

// ─── ANSWER FLOW ───────────────────────────────────────────────
function handleAnswer(correct){
  const isFinal=state.isFinalTest;
  if(correct){
    state.correct++;
    state.accXP+=state.lesson.xp/state.exercises.length;
    advanceAfterAnswer();
  } else {
    if(!isFinal){state.hearts--;}
    state.waitingContinue=true;
    renderApp();
  }
}

function advanceAfterAnswer(){
  state.waitingContinue=false;
  if(!state.isFinalTest&&state.hearts<=0){setState({screen:"complete"});return;}
  if(state.exIdx+1>=state.exercises.length){
    const totalXP=Math.round(state.accXP);
    const today=new Date().toDateString();
    const prevActive=state.user.lastActiveDate;
    let newStreak=state.user.streak||0;
    if(prevActive!==today){
      // Completing a lesson on a new calendar day → advance the streak.
      // applyStreakLogic already reset it to 0 on load if more than a day was missed.
      newStreak=newStreak+1;
    }
    const user={...state.user,xp:state.user.xp+totalXP,streak:newStreak,lessonsCompleted:[...new Set([...state.user.lessonsCompleted,state.lesson.id])],lastActiveDate:today};
    saveUserData(user);pushToLeaderboard(user);state.user=user;
    setState({screen:"complete"});
  } else {
    const nextIdx=state.exIdx+1;const nextEx=state.exercises[nextIdx];
    // Cancel any in-flight smooth scroll before re-rendering the next exercise
    window.scrollTo({top:0,left:0,behavior:"instant"});
    setState({
      exIdx:nextIdx,
      mcSelected:null,mcAnswered:false,
      matchSelectedLeft:null,matchMatched:[],matchWrong:null,
      matchShuffledRight:nextEx.type==="match"?shuffle(nextEx.pairs.map(p=>p.right)):[],
      fillInput:"",fillAnswered:false,fillCorrect:false,
      woSelected:[],woAvailable:nextEx.type==="wordOrder"?[...nextEx.shuffled]:[],woAnswered:false,woCorrect:false,
      tfAnswered:false,tfSelected:null,
      revfillSelected:null,revfillAnswered:false,
      errcorrectSelected:null,errcorrectAnswered:false,
      freetextInput:"",freetextSubmitted:false,
      waitingContinue:false,
    });
    // Re-apply instant scroll after DOM replacement and any pending animation frame,
    // to defeat in-flight smooth scrolls that survive innerHTML replacement
    requestAnimationFrame(()=>window.scrollTo({top:0,left:0,behavior:"instant"}));
  }
}

      <div style="color:var(--mid);font-size:16px;margin-bottom:20px">${state.correct}/${state.exercises.length} correct</div>
      <div style="display:flex;justify-content:center;gap:12px;margin-bottom:28px">

      </div>`;

    innerHTML=`

      <div style="font-family:var(--display);font-size:28px;font-weight:800;color:var(--red);margin-bottom:8px">Out of Hearts!</div>
      <div style="color:var(--dim);font-size:15px;margin-bottom:28px">Na malbravi! Trati otra hapa.<br><span style="font-size:13px;color:var(--mid)">(Don't fear! Try again.)</span></div>`;
  }

  app.innerHTML=`${confettiHTML}
    <div style="min-height:calc(100vh - 61px);display:flex;align-items:center;justify-content:center;padding:24px">
      <div style="text-align:center;max-width:400px;width:100%" class="pop">
        ${innerHTML}
        <button id="completeBtn" class="btn-primary" style="margin-bottom:10px">${passed?"CONTINUE":"TRY AGAIN"}</button>
        ${!passed?'<button id="backBtn" class="btn-secondary">BACK TO LESSONS</button>':''}
      </div>
    </div>`;

  document.getElementById("completeBtn").addEventListener("click",()=>{
    if(!passed){const idx=LESSONS.findIndex(l=>l.id===state.lesson.id);startLesson(idx);}
    else{
      const justFinishedId=state.lesson.id;
      setState({screen:"home",scrollToLessonId:justFinishedId});
      fetchLeaderboard().then(lb=>setState({leaderboard:lb}));
    }
  });
  const backBtn=document.getElementById("backBtn");if(backBtn)backBtn.addEventListener("click",()=>setState({screen:"home",scrollToLessonId:state.lesson.id}));
}

// DICTIONARY RENDERER

let dictEnQuery = '';
let dictPaQuery = '';
let dictBrowseLetter = '';

function searchEnToPA(q) {
  q = q.toLowerCase().trim();
  if(!q) return [];
  const exact=[],startsWith=[],contains=[];
  DICTIONARY.forEach(e => {
    const meanings = e.en.toLowerCase().split(/\s*\/\s*|\s*\(\s*|\s*\)\s*/).filter(Boolean);
    const enLower = e.en.toLowerCase();
    if(meanings.some(m=>m.trim()===q)) exact.push(e);
    else if(meanings.some(m=>m.trim().startsWith(q))||enLower.startsWith(q)) startsWith.push(e);
    else if(enLower.includes(q)) contains.push(e);
  });
  return [...exact,...startsWith,...contains];
}
function searchPAToEn(q) {
  q = q.toLowerCase().trim();
  if(!q) return [];
  const exact=[],startsWith=[],contains=[];
  DICTIONARY.forEach(e => {
    const p = e.pa.toLowerCase();
    if(p===q) exact.push(e);
    else if(p.startsWith(q)) startsWith.push(e);
    else if(p.includes(q)) contains.push(e);
  });
  return [...exact,...startsWith,...contains];
}

function renderDictResultItem(entry, direction) {
  const word = direction==='en' ? entry.pa : entry.en;
  const trans = direction==='en' ? entry.en : entry.pa;
  const arrow = direction==='en' ? '→' : '←';
  const noteHTML = entry.note ? `<div class="dict-result-note">🧩 ${entry.note}</div>` : '';
  return `<div class="dict-result-item">
    <span class="dict-result-arrow">${arrow}</span>
    <div style="flex:1;min-width:0">
      <div class="dict-result-word">${word}</div>
      <div class="dict-result-translation">${trans}</div>
      <span class="dict-result-pos">${entry.pos}</span>
      ${noteHTML}
    </div>
  </div>`;
}

function renderDict() {
  const el = document.getElementById('dict-body');
  const enResults = searchEnToPA(dictEnQuery);
  const paResults = searchPAToEn(dictPaQuery);

  let enResultsHTML = '';
  if(dictEnQuery.trim()) {
    if(enResults.length>0) {
      enResultsHTML = `<div class="dict-result-count">${enResults.length} result${enResults.length!==1?'s':''}</div>`;
      enResultsHTML += enResults.slice(0,30).map(e=>renderDictResultItem(e,'en')).join('');
      if(enResults.length>30) enResultsHTML += `<div class="dict-result-count" style="text-align:center;padding:12px">...and ${enResults.length-30} more</div>`;
    } else {
      enResultsHTML = `<div class="dict-no-results"><div class="dict-no-results-icon">🤔</div>No results for "${dictEnQuery}"</div>`;
    }
  }

  let paResultsHTML = '';
  if(dictPaQuery.trim()) {
    if(paResults.length>0) {
      paResultsHTML = `<div class="dict-result-count">${paResults.length} result${paResults.length!==1?'s':''}</div>`;
      paResultsHTML += paResults.slice(0,30).map(e=>renderDictResultItem(e,'pa')).join('');
      if(paResults.length>30) paResultsHTML += `<div class="dict-result-count" style="text-align:center;padding:12px">...and ${paResults.length-30} more</div>`;
    } else {
      paResultsHTML = `<div class="dict-no-results"><div class="dict-no-results-icon">🤔</div>No results for "${dictPaQuery}"</div>`;
    }
  }

  const letters = 'ABDEFGHIKLMNOPRSTUVWY'.split('');
  const paLetters = new Set(DICTIONARY.map(e=>e.pa[0].toUpperCase()));
  let browseHTML = '';
  if(dictBrowseLetter) {
    const br = DICTIONARY.filter(e=>e.pa[0].toUpperCase()===dictBrowseLetter);
    browseHTML = `<div class="dict-browse-results">${br.map(e=>renderDictResultItem(e,'pa')).join('')}</div>`;
  }

  const tips = [
    {title:"Nouns end in -o", text:"All nouns end in <strong>-o</strong>. Plurals add <strong>-s</strong>: libo → libos (books)"},
    {title:"Verbs end in -i", text:"Present/infinitive ends in <strong>-i</strong>. Past: <strong>pa</strong> + verb. Future: <strong>fu</strong> + verb."},
    {title:"Adjectives end in -a", text:"Both adjectives and adverbs end in <strong>-a</strong>. Adjectives precede nouns: bela kaso"},
    {title:"mal- = opposite", text:"Add <strong>mal-</strong> for opposites: bela → malbela (ugly), veni → malveni (leave)"},
    {title:"re- = again", text:"Add <strong>re-</strong> for repetition: legi → relegi (reread), pensi → repensi (remember)"},
    {title:"-ido = smaller", text:"<strong>-ido</strong> makes diminutives: pipo (dog) → pipido (puppy), fogo → fogido (flame)"},
    {title:"-io = doer", text:"<strong>-io</strong> creates agents: kanti → kantio (singer), labori → laborio (worker)"},
  ];
  const tip = tips[Math.floor(Date.now()/60000) % tips.length];

  el.innerHTML = `
    <div class="dict-stats">
      <span class="dict-stat-chip">📖 ${DICTIONARY.length} words</span>
      <span class="dict-stat-chip blue">🔤 Bidirectional</span>
      <span class="dict-stat-chip green">⚡ Instant</span>
    </div>

    <div class="dict-panel">
      <div class="dict-panel-label">
        <div class="dict-flag flag-en">EN</div>
        <span class="dict-panel-lang">English → Parli Aspo</span>
      </div>
      <div class="dict-input-wrap">
        <input class="dict-search-input" id="dictEnInput" type="text" placeholder="Type an English word..." value="${dictEnQuery}" autocomplete="off" autocapitalize="off" spellcheck="false">

      </div>
      <div class="dict-results">${enResultsHTML}</div>
    </div>

    <div class="dict-divider">
      <div class="dict-divider-line"></div>
      <div class="dict-divider-icon">⇅</div>
      <div class="dict-divider-line"></div>
    </div>

    <div class="dict-panel pa-panel">
      <div class="dict-panel-label">
        <div class="dict-flag flag-pa">PA</div>
        <span class="dict-panel-lang">Parli Aspo → English</span>
      </div>
      <div class="dict-input-wrap">
        <input class="dict-search-input" id="dictPaInput" type="text" placeholder="Topi parlo de Parli Aspo..." value="${dictPaQuery}" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button class="dict-clear-btn ${dictPaQuery?'visible':''}" id="dictPaClear">✕</button>
      </div>
      <div class="dict-results">${paResultsHTML}</div>
    </div>

    <div class="dict-grammar-tip">

      <div class="dict-grammar-tip-text">${tip.text}</div>
    </div>

    <div class="dict-browse-section">
      <div class="dict-browse-title">📚 Browse by letter</div>
      <div class="dict-letter-nav">
        ${letters.map(l=>{
          const has=paLetters.has(l);
          const active=dictBrowseLetter===l;
          return `<button class="dict-letter-btn ${active?'active':''} ${!has?'disabled':''}" data-letter="${l}" ${!has?'disabled':''}>${l}</button>`;
        }).join('')}
      </div>
      ${browseHTML}
    </div>
  `;

  // Bind events
  const enIn = document.getElementById('dictEnInput');
  const paIn = document.getElementById('dictPaInput');
  const sCaret = enIn.selectionStart;

  enIn.addEventListener('input', e => {
    const pos = e.target.selectionStart;
    dictEnQuery = e.target.value;
    renderDict();
    const el2 = document.getElementById('dictEnInput');
    el2.focus(); el2.setSelectionRange(pos,pos);
  });
  paIn.addEventListener('input', e => {
    const pos = e.target.selectionStart;
    dictPaQuery = e.target.value;
    renderDict();
    const el2 = document.getElementById('dictPaInput');
    el2.focus(); el2.setSelectionRange(pos,pos);
  });
  document.getElementById('dictEnClear').addEventListener('click', () => { dictEnQuery=''; renderDict(); document.getElementById('dictEnInput').focus(); });
  document.getElementById('dictPaClear').addEventListener('click', () => { dictPaQuery=''; renderDict(); document.getElementById('dictPaInput').focus(); });
  document.querySelectorAll('.dict-letter-btn:not(.disabled)').forEach(btn => {
    btn.addEventListener('click', () => {
      const l = btn.dataset.letter;
      dictBrowseLetter = dictBrowseLetter===l ? '' : l;
      renderDict();
    });
  });
}

function renderContact() {
  const el = document.getElementById('contact-body');
  el.innerHTML = `
    <div class="contact-intro">
      <div class="contact-intro-icon">💬</div>
      <div class="contact-intro-title">Get in Touch</div>
      <div class="contact-intro-desc">Have a suggestion for Parli Aspo? Found a bug in the app? Want to share feedback? We'd love to hear from you.</div>
    </div>

    <div id="contact-form-wrap">
      <div class="contact-form-group">
        <label class="contact-label" for="cf-name">Your Name <span style="color:var(--dim);font-weight:600">(optional)</span></label>
        <input class="contact-input" type="text" id="cf-name" placeholder="What should we call you?" autocomplete="name">
      </div>

      <div class="contact-form-group">
        <label class="contact-label" for="cf-email">Your Email <span style="color:var(--dim);font-weight:600">(optional — if you'd like a reply)</span></label>
        <input class="contact-input" type="email" id="cf-email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="contact-form-group">
        <label class="contact-label" for="cf-category">Category</label>
        <select class="contact-select" id="cf-category">
          <option value="Suggestion">💡 Suggestion</option>
          <option value="Bug Report">🐛 Bug Report</option>
          <option value="Feedback">⭐ General Feedback</option>
          <option value="New Word">📖 New Word Request</option>
          <option value="Other">💬 Other</option>
        </select>
      </div>

      <div class="contact-form-group">
        <label class="contact-label" for="cf-message">Message <span style="color:var(--red);font-size:12px">*</span></label>
        <textarea class="contact-textarea" id="cf-message" placeholder="Tell us what's on your mind..." maxlength="2000" oninput="document.getElementById('cf-chars').textContent=this.value.length+'/2000'"></textarea>
        <div class="contact-char-count" id="cf-chars">0 / 2000</div>
      </div>

      <div id="contact-emailjs-notice" class="contact-notice" style="display:${emailJSReady?'none':'block'}">
        <strong>⚠️ EmailJS not configured yet.</strong> To enable message sending, set up your EmailJS credentials in the script section of index.html (search for EMAILJS_PUBLIC_KEY). Until then, you can still copy your message manually.
      </div>

      <button class="contact-submit" id="cf-submit" onclick="submitContact()">
        Send Message ✉️
      </button>
    </div>

    <div id="contact-success" class="contact-success" style="display:none">
      <div class="contact-success-icon">✅</div>
      <div class="contact-success-title">Message Sent!</div>
      <div class="contact-success-desc">Grati for yun mesago!<br>Thank you for your message. We'll get back to you if you left an email.</div>
      <button class="btn-primary" style="max-width:240px;margin:0 auto" onclick="resetContact()">Send Another</button>
    </div>
  `;
}

function submitContact() {
  const name = document.getElementById('cf-name').value.trim() || 'Anonymous';
  const email = document.getElementById('cf-email').value.trim() || 'Not provided';
  const category = document.getElementById('cf-category').value;
  const message = document.getElementById('cf-message').value.trim();

  if(!message) {
    const ta = document.getElementById('cf-message');
    ta.style.borderColor = 'var(--red)';
    ta.focus();
    setTimeout(() => ta.style.borderColor = '', 1500);
    return;
  }

  const btn = document.getElementById('cf-submit');
  btn.disabled = true;
  btn.textContent = 'Sending…';

  if(emailJSReady) {
    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      from_name: name,
      from_email: email,
      category: category,
      message: message,
      to_email: 'njprentiss@gmail.com'
    }).then(() => {
      showContactSuccess();
    }).catch(err => {
      console.error('EmailJS error:', err);
      btn.disabled = false;
      btn.textContent = 'Send Message ✉️';
      alert('Failed to send. Please try again or email njprentiss@gmail.com directly.');
    });
  } else {
    // EmailJS not configured — show what would be sent
    console.log('Would send:', {from_name:name, from_email:email, category, message});
    setTimeout(showContactSuccess, 800);
  }
}

function showContactSuccess() {
  document.getElementById('contact-form-wrap').style.display = 'none';
  document.getElementById('contact-success').style.display = 'block';
}

function resetContact() {
  document.getElementById('contact-form-wrap').style.display = 'block';
  document.getElementById('contact-success').style.display = 'none';
  document.getElementById('cf-name').value = '';
  document.getElementById('cf-email').value = '';
  document.getElementById('cf-message').value = '';
  document.getElementById('cf-chars').textContent = '0 / 2000';
}

</script>
</body>
</html>
